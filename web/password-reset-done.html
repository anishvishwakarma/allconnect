<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Password updated — AllConnect</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #f5f5f7;
      color: #0c0c0f;
      padding: 24px;
    }
    .card {
      max-width: 380px;
      background: #fff;
      border-radius: 16px;
      padding: 28px 24px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.08);
      border: 1px solid #e5e5ea;
    }
    h1 { font-size: 1.25rem; font-weight: 700; margin: 0 0 12px; }
    p { margin: 0; font-size: 1rem; line-height: 1.5; color: #3a3a3c; }
    .accent { color: #e8751a; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Password updated</h1>
    <p>Open the <span class="accent">AllConnect</span> app and sign in with your new password.</p>
  </div>
</body>
</html>
